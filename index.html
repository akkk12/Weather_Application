
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Weather Application </title>
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="heading">
      <p class="hero__eyebrow">Weather now</p>
      <h1 class="hero__title" id="heading">Check the Weather in Any City</h1>
      <p class="hero__subtitle">Search any city and get the current conditions from OpenWeather.</p>
    </section>

    <form class="weather-form" data-weather-form>
      <div class="weather-form__field">
        <label class="weather-form__label" for="country">Select a Country :</label>
        <input
          class="weather-form__input"
          data-country-input
          id="country"
          list="country-suggestions"
          name="country"
          placeholder="Eg: India"
          type="text"
        >
        <datalist data-country-suggestions id="country-suggestions"></datalist>
      </div>

      <div class="weather-form__field">
        <label class="weather-form__label" for="city">Select a City :</label>
        <input
          class="weather-form__input"
          data-city-input
          id="city"
          list="city-suggestions"
          name="city"
          placeholder="Eg: New Delhi"
          required
          type="text"
        >
        <datalist data-city-suggestions id="city-suggestions"></datalist>
      </div>

      <input class="weather-form__submit" data-submit-button type="submit" value="Get weather">
    </form>

    <section class="results" aria-labelledby="weather-heading">
      <h2 class="section-title" id="weather-heading">Current conditions</h2>

      <div class="weather-card" aria-live="polite">
        <h3 class="weather-card__name" data-weather-name></h3>
        <p class="weather-card__detail" data-weather-temperature></p>
        <p class="weather-card__detail" data-weather-description></p>
      </div>
    </section>
  </main>

  <script src="env.js"></script>
  <script src="src/main.js" type="module"></script>
</body>
</html>
